name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'experimental/docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master]

env:
  OPENBLAS_NUM_THREADS: 1
  OMP_NUM_THREADS: 1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: zkml_system

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Install zkml-system
        working-directory: zkml_system
        run: pip install -e ".[dev]"

      - name: Install tda_fingerprint (optional sibling dependency)
        continue-on-error: true
        run: |
          pip install git+https://github.com/dweyhe/tda_fingerprint.git

      - name: Build Rust backend (optional, best-effort)
        continue-on-error: true
        working-directory: zkml_system/rust_backend
        run: |
          pip install maturin
          maturin develop --release
        
      - name: Run tests
        working-directory: zkml_system
        run: |
          python -m pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run demo (requires tda_fingerprint)
        continue-on-error: true
        working-directory: zkml_system
        run: python demo.py
        env:
          PYTHONPATH: ${{ github.workspace }}

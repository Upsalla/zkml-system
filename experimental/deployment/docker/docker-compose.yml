# zkML System Docker Compose
#
# Deployment-Konfiguration für die zkML PLONK Pipeline
#
# Usage:
#   docker-compose up -d        # Startet den API-Server
#   docker-compose logs -f      # Zeigt Logs
#   docker-compose down         # Stoppt den Server

version: '3.8'

services:
  zkml-api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: zkml-system:latest
    container_name: zkml-api
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: Nginx Reverse Proxy für Produktion
  nginx:
    image: nginx:alpine
    container_name: zkml-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - zkml-api
    profiles:
      - production
    restart: unless-stopped

networks:
  default:
    name: zkml-network
